*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f3f4f6;min-height:100vh}
header{background:#0f4025;border-bottom:4px solid #f5c842}
.header-inner{max-width:1100px;margin:0 auto;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}

.header-sub{color:rgba(247,247,242,0.45);font-size:11px;letter-spacing:0.06em;text-transform:uppercase;margin-top:2px}
.stat-pills{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.stat-pill{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);border-radius:20px;padding:3px 9px;font-size:11px;font-weight:600}

.stat-pill.green{background:rgba(16,185,129,0.15);color:#6ee7b7}

.toolbar{background:#1a6b3c;padding:9px 14px;display:flex;flex-wrap:wrap;gap:7px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.toolbar-left{display:flex;gap:5px;align-items:center;flex-wrap:wrap}

.name-input{background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.2);border-radius:6px;color:#fff;font-size:14px;padding:5px 10px;outline:none;font-family:inherit;width:140px}

.btn-gold{background:#f5c842;color:#0f4025;border:none;border-radius:6px;padding:6px 12px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-gold:hover{background:#fde882}
.filter-btn{background:rgba(255,255,255,0.08);border:1.5px solid transparent;color:rgba(255,255,255,0.5);border-radius:6px;padding:4px 9px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}

.sync-bar{background:#0f2d1a;border-bottom:1px solid #1a4a2a;padding:8px 16px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:8px}
.sync-btn{background:#f5c842;color:#0f4025;border:none;border-radius:6px;padding:6px 13px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap}
.sync-btn:disabled{opacity:0.55;cursor:default}
.sync-log{color:rgba(255,255,255,0.55);font-size:12px}
.sync-hint{color:rgba(255,255,255,0.28);font-size:11px;font-style:italic}
.players-bar{background:#1e7d46;padding:7px 14px;display:flex;flex-wrap:wrap;gap:5px;align-items:center;min-height:36px}
.players-label{color:rgba(255,255,255,0.5);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-right:4px}
.player-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:20px;font-size:12px;font-weight:700;color:#fff;border:2px solid}
.player-count{background:rgba(255,255,255,0.22);border-radius:10px;padding:0 5px;font-size:10px;font-weight:700}
.player-remove{background:rgba(255,255,255,0.22);border:none;border-radius:50%;width:14px;height:14px;font-size:9px;cursor:pointer;color:inherit;display:flex;align-items:center;justify-content:center;font-weight:700;padding:0;line-height:1}
.admin-banner{background:#7f1d1d;color:#fca5a5;padding:7px 16px;font-size:12px;text-align:center}
main{max-width:1100px;margin:0 auto;padding:16px 12px 60px}
.phase-heading{background:#0f4025;color:#f7f7f2;font-weight:800;font-size:14px;text-transform:uppercase;letter-spacing:0.08em;padding:8px 14px;border-radius:8px 8px 0 0;border-left:5px solid #f5c842;margin-top:24px}

.day-header{background:#d4ead9;color:#0f4025;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:0.08em;padding:5px 13px;border-bottom:2px solid #c3d9c8;display:flex;align-items:center;gap:10px}
.match-count{background:#c3d9c8;border-radius:20px;padding:1px 7px;font-size:10px;font-weight:600;color:#4a7a55}
.matches-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));border:1px solid #d1d5db;border-top:none}
.match-card{background:#fff;padding:10px 12px 8px;border-bottom:1px solid #e5e7eb;border-right:1px solid #e5e7eb}
.match-card.has-tips{background:#f0fdf4}
.match-card.has-result{background:#fffbeb}
.card-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.badge{background:#1a6b3c;color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:0.05em}
.badge.ko{background:#1c1c2e;color:#f5c842}
.card-time{font-size:11px;color:#9ca3af}
.result-badge{background:#fef3c7;color:#92400e;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;border:1px solid #fcd34d;margin-right:4px}
.teams{display:flex;align-items:center;gap:5px;margin-bottom:7px}
.team-btn{flex:1;background:transparent;border:2px solid transparent;border-radius:6px;padding:5px 3px;font-size:13px;font-weight:800;text-align:center;cursor:pointer;font-family:inherit;text-transform:uppercase;letter-spacing:0.02em;line-height:1.2}

.team-btn:disabled{cursor:default;opacity:0.5}
.team-btn.winner{background:#fef9c3;border-color:#fcd34d;color:#854d0e}
.vs{color:#9ca3af;font-size:11px;font-weight:700;flex-shrink:0}
.chips-row{display:flex;flex-wrap:wrap;gap:3px;min-height:20px;align-items:center;margin-bottom:5px}
.tip-chip{display:inline-flex;align-items:center;gap:2px;padding:2px 7px;border-radius:12px;font-size:11px;border:1.5px solid;font-family:inherit;cursor:pointer}

.tip-chip.wrong{background:#fee2e2;border-color:#dc2626;color:#7f1d1d;cursor:default}
.empty-hint{font-size:11px;color:#9ca3af;font-style:italic}
.card-footer{display:flex;justify-content:space-between;align-items:center}
.venue{font-size:10px;color:#9ca3af}
.result-btn{font-size:11px;color:#92400e;background:#fef3c7;border:1px solid #fcd34d;border-radius:4px;padding:2px 7px;cursor:pointer;font-family:inherit;font-weight:600;white-space:nowrap}

.lb-title{color:#f5c842;font-weight:800;font-size:17px;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px}
.lb-subtitle{color:rgba(255,255,255,0.35);font-size:12px;margin-bottom:16px}

.lb-name{font-weight:700;font-size:14px;flex:1}
.lb-bar-wrap{flex:2;margin:0 10px}
.lb-bar{background:rgba(255,255,255,0.1);border-radius:4px;height:5px;overflow:hidden;margin-bottom:2px}
.lb-fill{height:100%;border-radius:4px}
.lb-bar-label{font-size:11px;color:rgba(255,255,255,0.35)}
.lb-score{font-weight:900;font-size:22px;min-width:44px;text-align:right}
.mbm-section{margin-top:20px}
.mbm-heading{font-weight:700;font-size:13px;color:#6b7280;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.07em}
.mbm-row{background:#fff;border-radius:8px;padding:11px 13px;margin-bottom:7px;border:1px solid #e5e7eb}
.mbm-header{display:flex;justify-content:space-between;margin-bottom:5px;flex-wrap:wrap;gap:4px}
.mbm-match-name{font-weight:700;font-size:13px}
.mbm-date{font-size:11px;color:#6b7280}

.modal-sub{color:#9ca3af;font-size:11px;margin-bottom:13px}
.modal-prompt{font-weight:600;font-size:13px;color:#374151;margin-bottom:8px}
.tipper-row{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;border-radius:8px;border:2px solid #e5e7eb;margin-bottom:5px;cursor:pointer}
.tipper-row:hover{border-color:#1a6b3c}
.pick-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}

.pick-btn.selected{border-color:#1a6b3c;background:#f0fdf4;color:#0f4025}
.pick-btn.selected-green{border-color:#16a34a;background:#dcfce7;color:#14532d}
.pick-btn.draw-btn{grid-column:1/-1}
.close-btn{width:100%;background:#0f4025;color:#fff;border:none;border-radius:8px;padding:9px;font-weight:700;font-size:14px;cursor:pointer;margin-top:4px;font-family:inherit}
.back-btn{width:100%;background:#f3f4f6;border:none;border-radius:6px;padding:7px;font-size:12px;color:#6b7280;cursor:pointer;margin-bottom:5px;font-family:inherit;font-weight:600}

.setup-input:focus{border-color:#1a6b3c}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#1a6b3c;color:#fff;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;z-index:300;box-shadow:0 4px 16px rgba(0,0,0,0.2);white-space:nowrap;display:none}
.toast.error{background:#dc2626}
.toast.show{display:block}

@keyframes spin{to{transform:rotate(360deg)}}

// ── SUPABASE HELPERS ──────────────────────────────────────────────────────────
async function sb(path, method='GET', body=null) {
  const opts = { method, headers: HDR };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(`${SB_URL}/rest/v1/${path}`, opts);
  if (method==='GET') return r.json();
  return r.ok;
}

// ── LOAD ALL DATA ─────────────────────────────────────────────────────────────
async function loadAll(silent) {
  try {
    const [pRows, tRows, rRows] = await Promise.all([
      sb('players?select=id,name,color_idx&order=created_at'),
      sb('tips?select=player_id,match_id,team'),
      sb('results?select=match_id,winner'),
    ]);
    players = pRows || [];
    tips = {};
    (tRows||[]).forEach(r => {
      if (!tips[r.match_id]) tips[r.match_id] = {};
      tips[r.match_id][r.player_id] = r.team;
    });
    results = {};
    (rRows||[]).forEach(r => { results[r.match_id] = r.winner; });
    if (!silent) showMain();
    render();
  } catch(e) {
    if (!silent) showMain();
  }
}

// ── INDIVIDUAL SAVES (no more full overwrites) ────────────────────────────────

// Upsert a single tip row — only touches this one cell
async function saveTip(playerId, matchId, team) {
  await sb('tips', 'POST', { player_id: playerId, match_id: matchId, team, updated_at: new Date().toISOString() });
}

// Delete a single tip row
async function deleteTip(playerId, matchId) {
  await sb(`tips?player_id=eq.${playerId}&match_id=eq.${matchId}`, 'DELETE');
}

// Upsert a single result row
async function saveResult(matchId, winner) {
  await sb('results', 'POST', { match_id: matchId, winner, updated_at: new Date().toISOString() });
}

// Delete a result row
async function deleteResult(matchId) {
  await sb(`results?match_id=eq.${matchId}`, 'DELETE');
}

// Insert a player row
async function savePlayer(player) {
  await sb('players', 'POST', player);
}

// Delete a player and all their tips
async function deletePlayer(id) {
  await Promise.all([
    sb(`players?id=eq.${id}`, 'DELETE'),
    sb(`tips?player_id=eq.${id}`, 'DELETE'),
  ]);
}

function showMain() {
  const name = localStorage.getItem('wc2026_name');
  if (name) {
    myName = name;
    document.getElementById('setupScreen').style.display='none';
    document.getElementById('appScreen').style.display='block';
    ensurePlayerExists(name);
  } else {
    document.getElementById('setupScreen').innerHTML=`
      <div class="setup-wrap"><div class="setup-box">
        <div style="font-size:50px;margin-bottom:10px">⚽</div>
        <h1>2026 World Cup Tipping</h1>
        <p>Enter your name to join. Picks are live for everyone on this link.</p>
        <input id="setupInput" class="setup-input" placeholder="Your name…" maxlength="20"
          onkeydown="if(event.key==='Enter')handleSetup()" autofocus/>
        <button class="setup-btn" onclick="handleSetup()">Join Competition →</button>
        <p class="setup-hint">No account needed — just open the link.</p>
      </div></div>`;
  }
}

async function ensurePlayerExists(name) {
  // Query Supabase directly before inserting to prevent duplicate players
  // when the same person opens the app on two devices at nearly the same time
  try {
    const existing = await sb('players?name=eq.' + encodeURIComponent(name) + '&select=id,name,color_idx');
    if (existing && existing.length > 0) {
      if (!players.find(p => p.name.toLowerCase() === name.toLowerCase())) {
        players.push(existing[0]);
        render();
      }
      return;
    }
    const p = { id:'p_'+Date.now(), name, color_idx: players.length % COLORS.length };
    players.push(p);
    await savePlayer(p);
    render();
  } catch(e) {
    if (!players.find(p => p.name.toLowerCase() === name.toLowerCase())) {
      const p = { id:'p_'+Date.now(), name, color_idx: players.length % COLORS.length };
      players.push(p);
      savePlayer(p);
      render();
    }
  }
}

function handleSetup() {
  const input=document.getElementById('setupInput');

  myName=name; localStorage.setItem('wc2026_name',name);

function addTipper() {
  const input=document.getElementById('newPlayerInput'); const name=input.value.trim(); if (!name) return;
  if (players.find(p=>p.name.toLowerCase()===name.toLowerCase())) { showToast('Name already added.',true); return; }
  const p={id:'p_'+Date.now(), name, color_idx: players.length % COLORS.length};
  players.push(p); savePlayer(p); input.value=''; render();
  showToast(`${name} added!`);
}

function removeTipper(id) {
  const p=players.find(x=>x.id===id);

  showConfirmDelete(p);
}

function showConfirmDelete(p) {
  const box=document.getElementById('confirmModalBox');
  document.getElementById('confirmOverlay').style.display='flex';
  box.innerHTML=`
    <h3>Remove ${esc(p.name)}?</h3>
    <p>This will delete all of ${esc(p.name)}'s tips permanently. Type their name to confirm.</p>
    <input class="confirm-input" id="confirmInput" placeholder="Type name here…"

    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="btn-danger" id="confirmDeleteBtn" onclick="doDeletePlayer('${p.id}','${escJ(p.name)}')">Remove</button>
    </div>`;
  setTimeout(()=>document.getElementById('confirmInput')?.focus(),100);
}

function closeConfirm() { document.getElementById('confirmOverlay').style.display='none'; }

async function doDeletePlayer(id, name) {
  const input=document.getElementById('confirmInput');
  if (!input || input.value.trim().toLowerCase()!==name.toLowerCase()) return;
  closeConfirm();
  players=players.filter(x=>x.id!==id);
  Object.keys(tips).forEach(mid=>{ if(tips[mid]) delete tips[mid][id]; });
  await deletePlayer(id);
  render(); showToast(`${name} removed.`);
}

// ── TIPS ─────────────────────────────────────────────────────────────────────
async function setTip(matchId, playerId, team) {
  if (!tips[matchId]) tips[matchId]={};
  tips[matchId][playerId]=team;
  closeTipModal(); render();
  await saveTip(playerId, matchId, team); // single-row upsert — can't affect anyone else
  const p=players.find(x=>x.id===playerId);
  showToast(`${p?.name}: ${team} ✓`);
}

async function clearTip(matchId, playerId) {
  if (tips[matchId]) delete tips[matchId][playerId];
  closeTipModal(); render();
  await deleteTip(playerId, matchId);
}

// ── RESULTS ───────────────────────────────────────────────────────────────────
async function setResult(matchId, winner) {
  if (winner===null) { delete results[matchId]; await deleteResult(matchId); }
  else { results[matchId]=winner; await saveResult(matchId, winner); }
  closeResultModal(); render();
  showToast(winner?`Result: ${winner}`:'Result cleared');
}

// ── AUTO SYNC ─────────────────────────────────────────────────────────────────
async function syncResults() {
  const btn=document.getElementById('syncBtn'); const log=document.getElementById('syncLog');
  btn.disabled=true; log.textContent='Searching for completed results…';
  const missing=SCHEDULE.filter(m=>m.phase==='Group Stage'&&m.home!=='TBD'&&!results[m.id]);
  if (!missing.length) { log.textContent='All group stage results already recorded.'; btn.disabled=false; return; }
  log.textContent=`Checking ${missing.length} unresolved matches…`;
  const matchList=missing.map(m=>`ID ${m.id}: ${m.home} vs ${m.away} (${m.date}, Group ${m.group})`).join('\n');
  const prompt=`You are a football results assistant for the 2026 FIFA World Cup.
Use web search to find the final results for these completed matches.
Only include matches that have FULLY FINISHED (full-time, not live or upcoming).
For each finished match return the winner name exactly as shown, or "Draw" if it ended level.
If not yet played or still live, omit it.

Matches:
${matchList}

Reply ONLY with JSON, no markdown:
{"results":[{"id":0,"winner":"Mexico"},{"id":5,"winner":"Draw"}]}`;
  try {
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{role:'user',content:prompt}]})
    });
    if (!resp.ok) throw new Error('API error '+resp.status);
    const data=await resp.json();
    const text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const m=text.match(/\{[\s\S]*\}/); if (!m) throw new Error('No JSON in response');
    const found=JSON.parse(m[0]).results||[];
    if (!found.length) { log.textContent='No new completed results found.'; }
    else {
      // Save each result individually
      await Promise.all(found.map(({id,winner})=>{
        if (!winner) return;
        results[id]=winner;
        return saveResult(id, winner);
      }));
      render();
      log.textContent=`Done — ${found.length} result${found.length!==1?'s':''} synced.`;
      showToast(`${found.length} result${found.length!==1?'s':''} synced!`);
    }
  } catch(e) { log.textContent='Sync failed: '+e.message; showToast('Auto-sync failed. Use manual entry.',true); }
  btn.disabled=false;
}

// ── SCORING ───────────────────────────────────────────────────────────────────
function calcScores(matches) {
  const scores={};
  players.forEach(p=>{scores[p.id]={correct:0,tipped:0};});
  matches.forEach(m=>{
    const result=results[m.id]; if (!result) return;
    const mt=tips[m.id]||{};
    players.forEach(p=>{ if (mt[p.id]) { scores[p.id].tipped++; if (mt[p.id]===result) scores[p.id].correct++; } });
  });
  return scores;
}

function renderPills() {
  const matches=getFiltered();
  const tipped=matches.filter(m=>players.some(p=>(tips[m.id]||{})[p.id])).length;
  const ri=matches.filter(m=>results[m.id]).length;
  let html=`<div class="stat-pill">${tipped}/${matches.length} tipped</div>`;
  if (ri>0) html+=`<div class="stat-pill gold">${ri} results in</div>`;
  html+=`<div class="stat-pill green">✓ Live</div>`;
  document.getElementById('statPills').innerHTML=html;
  document.getElementById('headerSub').textContent=`Canada · Mexico · USA · ${players.length} player${players.length!==1?'s':''}`;
}

function renderPlayers() {
  const bar=document.getElementById('playersBar');
  if (!players.length) { bar.innerHTML='<span class="players-label">Players:</span><span style="color:rgba(255,255,255,0.35);font-size:12px;font-style:italic">Add names above to start</span>'; return; }
  const scores=calcScores(getFiltered());
  let html='<span class="players-label">Players:</span>';
  players.forEach(p=>{
    const c=COLORS[p.color_idx]; const sc=scores[p.id];
    const label=activeTab==='scores'&&sc?`${sc.correct}/${sc.tipped}`:SCHEDULE.filter(m=>(tips[m.id]||{})[p.id]).length;
    html+=`<span class="player-chip" style="background:${c.bg};border-color:${c.border}">${esc(p.name)}<span class="player-count">${label}</span><button class="player-remove" onclick="removeTipper('${p.id}')" title="Remove ${esc(p.name)}">✕</button></span>`;
  });
  bar.innerHTML=html;
}

function renderSchedule() {
  const matches=getFiltered(); const grouped={};
  matches.forEach(m=>{ if(!grouped[m.phase]) grouped[m.phase]={}; if(!grouped[m.phase][m.date]) grouped[m.phase][m.date]=[]; grouped[m.phase][m.date].push(m); });
  let html='';
  PHASE_ORDER.forEach(phase=>{
    if (!grouped[phase]) return;
    const isKO=phase!=='Group Stage';
    html+=`<div class="phase-heading${isKO?' knockout':''}">${phase}</div>`;
    Object.entries(grouped[phase]).forEach(([date,dayMatches])=>{
      html+=`<div class="day-header">${date}<span class="match-count">${dayMatches.length} match${dayMatches.length!==1?'es':''}</span></div><div class="matches-grid">`;
      dayMatches.forEach(m=>{
        const mt=tips[m.id]||{}; const result=results[m.id];
        const withPick=players.filter(p=>mt[p.id]); const isTBD=m.home==='TBD';
        const bl=m.group==='R32'?'R of 32':m.group==='R16'?'R of 16':m.group==='QF'?'QF':m.group==='SF'?'SF':m.group==='3P'?'3rd':m.group==='FIN'?'Final':`Grp ${m.group}`;
        html+=`<div class="match-card${withPick.length?' has-tips':''}${result?' has-result':''}">
          <div class="card-meta"><span class="badge${isKO?' ko':''}">${bl}</span>
            <div style="display:flex;align-items:center">${result?`<span class="result-badge">✓ ${esc(result)}</span>`:''}<span class="card-time">${m.time}</span></div></div>
          <div class="teams">
            <button class="team-btn${result===m.home?' winner':''}" ${isTBD?'disabled':''} onclick="openTipModal(${m.id},'${escJ(m.home)}')">${esc(m.home)}</button>
            <span class="vs">vs</span>
            <button class="team-btn${result===m.away?' winner':''}" ${isTBD?'disabled':''} onclick="openTipModal(${m.id},'${escJ(m.away)}')">${esc(m.away)}</button>
          </div><div class="chips-row">`;
        if (withPick.length) {
          withPick.forEach(p=>{
            const c=COLORS[p.color_idx]; const pick=mt[p.id];
            const isCorrect=result&&pick===result; const isWrong=result&&pick!==result;
            const cls=isCorrect?' correct':isWrong?' wrong':'';
            const style=cls?'':`style="background:${c.light};border-color:${c.border};color:${c.text}"`;
            html+=`<span class="tip-chip${cls}" ${style} ${!result?`onclick="openTipModalForTipper(${m.id},'${p.id}')"`:''}><strong>${esc(p.name)}</strong><span style="opacity:0.7;margin-left:2px">→ ${esc(pick)}</span>${result?`<span style="margin-left:2px">${isCorrect?'✓':'✗'}</span>`:''}</span>`;
          });
        } else if (!isTBD&&players.length) { html+=`<span class="empty-hint">Tap a team to tip</span>`; }
        html+=`</div><div class="card-footer"><span class="venue">📍 ${m.venue}</span>${adminMode&&!isTBD?`<button class="result-btn" onclick="openResultModal(${m.id})">${result?'✏️ Edit result':'+ Enter result'}</button>`:''}</div></div>`;
      });
      html+='</div>';
    });
  });
  // Mini leaderboard
  const scores=calcScores(matches); const ri=matches.filter(m=>results[m.id]).length;
  if (ri&&players.length) {
    const sorted=[...players].sort((a,b)=>(scores[b.id]?.correct||0)-(scores[a.id]?.correct||0));
    html+=`<div class="leaderboard"><div class="lb-title">🏆 Leaderboard</div><div class="lb-subtitle">${ri} result${ri!==1?'s':''} recorded — tap Scores for full breakdown</div>`;
    ['🥇','🥈','🥉'].forEach((medal,i)=>{
      if (!sorted[i]) return; const p=sorted[i]; const c=COLORS[p.color_idx]; const sc=scores[p.id]||{correct:0,tipped:0}; const pct=sc.tipped?Math.round(sc.correct/sc.tipped*100):0;
      html+=`<div class="lb-row"><span style="font-size:18px;width:28px;text-align:center;flex-shrink:0">${medal}</span><span class="lb-name" style="color:${c.bg}">${esc(p.name)}</span><div class="lb-bar-wrap"><div class="lb-bar"><div class="lb-fill" style="width:${pct}%;background:${c.bg}"></div></div><div class="lb-bar-label">${sc.correct} correct of ${sc.tipped} tipped</div></div><span class="lb-score" style="color:${c.bg}">${sc.correct}<span style="font-size:12px;opacity:0.55;margin-left:2px">pts</span></span></div>`;
    });
    html+='</div>';
  }
  document.getElementById('mainContent').innerHTML=html;
}

function renderScores() {
  const matches=getFiltered(); const scores=calcScores(matches);
  const ri=matches.filter(m=>results[m.id]).length;
  if (!ri) { document.getElementById('mainContent').innerHTML=`<div class="no-results"><div class="icon">🏆</div><p>No results yet</p><small>Hit <strong>⚡ Auto-sync results</strong> to pull in completed match winners.</small></div>`; return; }
  const sorted=[...players].sort((a,b)=>(scores[b.id]?.correct||0)-(scores[a.id]?.correct||0));
  const medals=['🥇','🥈','🥉'];
  let html=`<div class="leaderboard"><div class="lb-title">🏆 Leaderboard</div><div class="lb-subtitle">${ri} result${ri!==1?'s':''} recorded</div>`;
  sorted.forEach((p,i)=>{ const c=COLORS[p.color_idx]; const sc=scores[p.id]||{correct:0,tipped:0}; const pct=sc.tipped?Math.round(sc.correct/sc.tipped*100):0;
    html+=`<div class="lb-row"><span style="font-size:20px;width:30px;text-align:center;flex-shrink:0">${medals[i]||'#'+(i+1)}</span><span class="lb-name" style="color:${c.bg}">${esc(p.name)}</span><div class="lb-bar-wrap"><div class="lb-bar"><div class="lb-fill" style="width:${pct}%;background:${c.bg}"></div></div><div class="lb-bar-label">${sc.correct} correct of ${sc.tipped} tipped (${pct}%)</div></div><span class="lb-score" style="color:${c.bg}">${sc.correct}<span style="font-size:12px;opacity:0.55;margin-left:2px">pts</span></span></div>`;
  });
  html+='</div><div class="mbm-section"><div class="mbm-heading">Match breakdown</div>';
  matches.filter(m=>results[m.id]).forEach(m=>{
    const result=results[m.id]; const mt=tips[m.id]||{};
    html+=`<div class="mbm-row"><div class="mbm-header"><span class="mbm-match-name">${esc(m.home)} vs ${esc(m.away)}</span><span class="mbm-date">${m.date}</span></div><div><span class="mbm-result">Winner: ${esc(result)}</span></div><div class="mbm-chips">`;
    players.forEach(p=>{ const pick=mt[p.id]; const ok=pick&&pick===result; const style=pick?(ok?'background:#dcfce7;color:#14532d;border-color:#86efac':'background:#fee2e2;color:#7f1d1d;border-color:#fca5a5'):'background:#f3f4f6;color:#9ca3af;border-color:#e5e7eb'; html+=`<span class="mbm-chip" style="${style}">${esc(p.name)}: ${pick?esc(pick)+' '+(ok?'✓':'✗'):'—'}</span>`; });
    html+='</div></div>';
  });
  html+='</div>';
  document.getElementById('mainContent').innerHTML=html;
}

// ── MODALS ────────────────────────────────────────────────────────────────────
function openTipModal(matchId,preTeam) {
  if (!players.length) { showToast('Add players first!',true); return; }
  if (players.length===1) { if (preTeam) { setTip(matchId,players[0].id,preTeam); return; } modalState={matchId,step:'team',playerId:players[0].id}; renderTipModal(); return; }
  const me=players.find(p=>p.name.toLowerCase()===myName.toLowerCase());
  if (me&&preTeam) { setTip(matchId,me.id,preTeam); return; }
  if (me) { modalState={matchId,step:'team',playerId:me.id}; renderTipModal(); return; }
  modalState={matchId,step:'tipper',preTeam}; renderTipModal();
}
function openTipModalForTipper(matchId,playerId) { modalState={matchId,step:'team',playerId}; renderTipModal(); }

function renderTipModal() {
  const m=SCHEDULE[modalState.matchId];
  document.getElementById('tipOverlay').style.display='flex';
  let html=`<div class="modal-title">${esc(m.home)} <span style="color:#9ca3af;font-size:13px">vs</span> ${esc(m.away)}</div><div class="modal-sub">${m.date} · ${m.time} · ${m.venue}</div>`;
  if (modalState.step==='tipper') {
    html+=`<p class="modal-prompt">Who's picking?</p>`;
    players.forEach(p=>{ const c=COLORS[p.color_idx]; const ex=(tips[modalState.matchId]||{})[p.id]; html+=`<div class="tipper-row${ex?' has-pick':''}" style="${ex?`border-color:${c.border};background:${c.light}`:''}" onclick="selectPlayer('${p.id}')"><span style="font-weight:700;color:${c.bg};font-size:15px">${esc(p.name)}</span><span style="font-size:13px;color:#6b7280">${ex?'✓ '+esc(ex):'No pick'}</span></div>`; });
  } else {
    const p=players.find(x=>x.id===modalState.playerId); const c=p?COLORS[p.color_idx]:COLORS[0];
    if (p) html+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span class="who-chip" style="background:${c.bg};border-color:${c.border}">${esc(p.name)}</span><span style="font-size:13px;color:#6b7280">picking</span></div>`;
    const ex=p?(tips[modalState.matchId]||{})[p.id]:null;
    html+=`<p class="modal-prompt">Pick the winner:</p><div class="pick-grid">`;
    [m.home,m.away].forEach(team=>{ html+=`<button class="pick-btn${ex===team?' selected':''}" onclick="setTip(${modalState.matchId},'${modalState.playerId}','${escJ(team)}')">${esc(team)}${ex===team?'<span style="display:block;font-size:11px;margin-top:2px;opacity:0.6">Current pick</span>':''}</button>`; });
    html+='</div>';
    if (players.length>1) html+=`<button class="back-btn" onclick="selectBack()">← Back</button>`;
  }
  html+=`<button class="close-btn" onclick="closeTipModal()">Close</button>`;
  document.getElementById('tipModalBox').innerHTML=html;
}
function selectPlayer(id) { modalState.step='team'; modalState.playerId=id; renderTipModal(); }
function selectBack() { modalState.step='tipper'; modalState.playerId=null; renderTipModal(); }
function closeTipModal() { document.getElementById('tipOverlay').style.display='none'; modalState=null; }

function openResultModal(matchId) {
  const m=SCHEDULE[matchId]; const cur=results[matchId];
  document.getElementById('resultOverlay').style.display='flex';
  document.getElementById('resultModalBox').innerHTML=`
    <div class="modal-title">Enter Result</div>
    <div class="modal-sub">${esc(m.home)} vs ${esc(m.away)} · ${m.date}</div>
    <p class="modal-prompt">Who won?</p>
    <div class="pick-grid">
      <button class="pick-btn${cur===m.home?' selected-green':''}" onclick="setResult(${matchId},'${escJ(m.home)}')">${esc(m.home)}${cur===m.home?'<span style="display:block;font-size:11px;margin-top:2px;opacity:0.65">✓ Recorded</span>':''}</button>
      <button class="pick-btn${cur===m.away?' selected-green':''}" onclick="setResult(${matchId},'${escJ(m.away)}')">${esc(m.away)}${cur===m.away?'<span style="display:block;font-size:11px;margin-top:2px;opacity:0.65">✓ Recorded</span>':''}</button>
      <button class="pick-btn draw-btn${cur==='Draw'?' selected-green':''}" onclick="setResult(${matchId},'Draw')">Draw${cur==='Draw'?'<span style="display:block;font-size:11px;margin-top:2px;opacity:0.65">✓ Recorded</span>':''}</button>
    </div>
    ${cur?`<button style="width:100%;background:transparent;border:1px solid #e5e7eb;border-radius:6px;padding:7px;font-size:12px;color:#9ca3af;cursor:pointer;margin-bottom:5px;font-family:inherit" onclick="setResult(${matchId},null)">Clear result</button>`:''}
    <button class="close-btn" onclick="closeResultModal()">Done</button>`;
}
function closeResultModal() { document.getElementById('resultOverlay').style.display='none'; modalState=null; }

// ── UTILS ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg,err=false) { const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'+(err?' error':''); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2800); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escJ(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
</script>
